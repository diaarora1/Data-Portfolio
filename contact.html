    <section id="contact-me" class="project-section">
        <h2>Contact Me</h2>
        <p>Have questions about my data projects or want to collaborate? Drop a message below!</p>
        
        <form action="https://formspree.io/f/mjgdyqby" method="POST" class="contact-form">
            <h4>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required placeholder="Your Name">
            <br>
            
            <label for="email">Your Email:</label>
            <input type="email" id="email" name="_replyto" required placeholder="your.email@example.com">
            <br>
            
            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" placeholder="What is this regarding?">
            <br>
            
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required placeholder="Type your message here..."></textarea>
            <br>
            
            <button type="submit">Send Message</button>
        </h4>
        </form>
    </section>
</body>
